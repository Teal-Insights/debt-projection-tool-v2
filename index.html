<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Debt Projection Tool — Version 2</title>
    <meta
      name="description"
      content="Interactive sovereign debt-to-GDP projection tool. Replicates the FT 2014 Debt Dynamics Visualizer with the latest IMF WEO data (April 2026) across 170 economies. Built by Teal Insights and Nature Finance."
    />
    <meta name="theme-color" content="#0a2540" />

    <!-- Favicon — globe crop of the Teal Insights mark. Modern browsers
         render SVG favicons natively; the navy backdrop ensures the white
         globe is visible in light tab bars. -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./favicon.svg" />

    <!-- OpenGraph (Slack, LinkedIn, iMessage, Facebook, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Debt Projection Tool — Teal Insights" />
    <meta
      property="og:description"
      content="Explore sovereign debt-to-GDP under your own macro assumptions. 170 economies, IMF WEO April 2026 data."
    />
    <meta property="og:image" content="./og-card.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Debt Projection Tool — Teal Insights and Nature Finance" />
    <meta property="og:site_name" content="Teal Insights" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Debt Projection Tool — Teal Insights" />
    <meta
      name="twitter:description"
      content="Explore sovereign debt-to-GDP under your own macro assumptions. 170 economies, IMF WEO April 2026 data."
    />
    <meta name="twitter:image" content="./og-card.svg" />
    <meta name="twitter:image:alt" content="Debt Projection Tool — Teal Insights and Nature Finance" />
    <!-- KaTeX — loaded entirely from CDN (both stylesheet and JS) so the
         Methodology tab's typeset equation works regardless of whether
         `katex` is installed locally under node_modules. The repo's v1
         and v2 projects sometimes share a hoisted node_modules tree, and
         in that setup neither the CSS import path nor the JS package was
         reliably resolvable from within v2. Version-pinned to 0.16.11. -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
      crossorigin="anonymous"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
