name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deploy; cancel in-progress runs so the latest push
# wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # --legacy-peer-deps: vite 8 + @vitejs/plugin-react 4.7 have an
        # incorrectly-narrow peer-dep range (plugin-react caps at vite 7).
        # The combo works fine at runtime; legacy-peer-deps tolerates the
        # range check during install. Same flag would be needed locally too.
        run: npm install --legacy-peer-deps

      - name: Build
        # Intentionally NOT setting VITE_BASE_PATH so vite.config.ts uses its
        # default of './' (relative paths). This works at any URL the artifact
        # gets served from:
        #   - private-repo preview URLs like https://stunning-adventure-*.pages.github.io/
        #     (serve from root — would 404 with a /<repo>/ prefix)
        #   - standard public project sites at https://<user>.github.io/<repo>/
        #   - custom domains at /
        # Relative paths handle all three; an absolute /<repo>/ prefix only
        # works for the second.
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        # Pages must be enabled manually in repo settings before the first run:
        #   Settings → Pages → Source: "GitHub Actions"
        # The `enablement: true` flag exists but requires a PAT with admin
        # scope — the default GITHUB_TOKEN can't enable Pages, only deploy to
        # an already-enabled site.

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
